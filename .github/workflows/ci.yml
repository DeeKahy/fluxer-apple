name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Run FluxerKit tests
        run: swift test
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build macOS app
        run: |
          xcodebuild -project Fluxer.xcodeproj -scheme Fluxer-macOS \
            -destination 'platform=macOS' build \
            CODE_SIGNING_ALLOWED=NO | tail -5
      - name: Build iOS app
        run: |
          xcodebuild -project Fluxer.xcodeproj -scheme Fluxer-iOS \
            -destination 'generic/platform=iOS Simulator' build \
            CODE_SIGNING_ALLOWED=NO | tail -5
